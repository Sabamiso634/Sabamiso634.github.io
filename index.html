<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Demo video page for a research project in preparation.">
  <title>Research Demo Videos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header id="top" class="site-header">
    <nav class="nav" aria-label="Primary navigation">
      <a class="brand" href="#top" aria-label="Project home">Research Demo Videos</a>
      <div class="nav-links">
        <a href="#demo"><span class="lang-en">Demo</span><span class="lang-ja">デモ</span></a>
      </div>
      <div class="language-switch" aria-label="Language selection">
        <button type="button" data-set-lang="en" aria-pressed="true">EN</button>
        <button type="button" data-set-lang="ja" aria-pressed="false">日本語</button>
      </div>
    </nav>

    <section class="hero">
      <h1>
        <span class="lang-en">Research Demo Videos</span>
        <span class="lang-ja">研究デモ動画</span>
      </h1>

      <div class="hero-actions" aria-label="Main actions">
        <a class="button primary" href="#demo"><span class="lang-en">Watch demos</span><span class="lang-ja">デモを見る</span></a>
      </div>
    </section>
  </header>

  <main>
    <section id="demo" class="section card-section">
      <div class="section-heading">
        <h2>
          <span class="lang-en">Videos</span>
          <span class="lang-ja">動画</span>
        </h2>
      </div>

      <div class="video-grid">
        <article class="media-card">
          <div class="tag"><span class="lang-en">Demo 1</span><span class="lang-ja">デモ1</span></div>
          <h3><span class="lang-en">Demo video 1</span><span class="lang-ja">デモ動画1</span></h3>
          <video class="demo-video" controls preload="metadata">
            <source src="assets/nrp_demo.webm" type="video/webm">
            Your browser does not support the video tag.
          </video>
          <div class="media-actions">
            <a class="button small" href="assets/nrp_demo.webm" download><span class="lang-en">Download video</span><span class="lang-ja">動画をダウンロード</span></a>
          </div>
        </article>

        <article class="media-card">
          <div class="tag secondary"><span class="lang-en">Demo 2</span><span class="lang-ja">デモ2</span></div>
          <h3><span class="lang-en">Demo video 2</span><span class="lang-ja">デモ動画2</span></h3>
          <video class="demo-video" controls preload="metadata">
            <source src="assets/mujoco_demo.webm" type="video/webm">
            Your browser does not support the video tag.
          </video>
          <div class="media-actions">
            <a class="button small" href="assets/mujoco_demo.webm" download><span class="lang-en">Download video</span><span class="lang-ja">動画をダウンロード</span></a>
          </div>
        </article>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>
      <span class="lang-en">mail: t2641009@gl.cc.uec.ac.jp</span>
      <span class="lang-ja">mail: t2641009@gl.cc.uec.ac.jp</span>
    </p>
  </footer>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const requested = params.get('lang');
      const stored = localStorage.getItem('site-language');
      const browser = navigator.language && navigator.language.toLowerCase().startsWith('ja') ? 'ja' : 'en';
      const initial = requested === 'ja' || requested === 'en' ? requested : (stored || browser);
      function setLanguage(lang) {
        const normalized = lang === 'ja' ? 'ja' : 'en';
        document.documentElement.lang = normalized;
        document.querySelectorAll('[data-set-lang]').forEach((button) => {
          const active = button.getAttribute('data-set-lang') === normalized;
          button.setAttribute('aria-pressed', active ? 'true' : 'false');
        });
        localStorage.setItem('site-language', normalized);
      }
      document.querySelectorAll('[data-set-lang]').forEach((button) => {
        button.addEventListener('click', () => setLanguage(button.getAttribute('data-set-lang')));
      });
      setLanguage(initial);
    })();
  </script>
</body>
</html>
